<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="fundo" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#6b7280"/>
      <stop offset="55%" stop-color="#4b5563"/>
      <stop offset="100%" stop-color="#374151"/>
    </radialGradient>
    <linearGradient id="cranio" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#e8e8f0"/>
      <stop offset="100%" stop-color="#a8a8b8"/>
    </linearGradient>
    <radialGradient id="olho" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="55%" stop-color="#dc0000"/>
      <stop offset="100%" stop-color="#450000"/>
    </radialGradient>
    <filter id="sombra" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.9"/>
    </filter>
    <filter id="glowOlho" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="20" y="20" width="472" height="472" rx="100" fill="url(#fundo)"/>
  <rect x="20" y="20" width="472" height="472" rx="100" fill="none" stroke="#9ca3af" stroke-opacity="0.5" stroke-width="3"/>

  <g filter="url(#sombra)" transform="translate(256 238)">
    <path fill="url(#cranio)" stroke="#1a1a22" stroke-width="7" stroke-linejoin="round"
      d="M0 -122 C-90 -122 -134 -58 -134 6 C-134 54 -108 88 -72 104 L-72 128
         C-72 148 -56 164 -36 164 L36 164 C56 164 72 148 72 128 L72 104
         C108 88 134 54 134 6 C134 -58 90 -122 0 -122 Z"/>

    <!-- Contorno forte -->
    <path fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="3"
      d="M0 -122 C-90 -122 -134 -58 -134 6 C-134 54 -108 88 -72 104 L-72 128
         C-72 148 -56 164 -36 164 L36 164 C56 164 72 148 72 128 L72 104
         C108 88 134 54 134 6 C134 -58 90 -122 0 -122 Z"/>

    <!-- Olhos -->
    <ellipse cx="-48" cy="-4" rx="42" ry="50" fill="#0a0008"/>
    <ellipse cx="48" cy="-4" rx="42" ry="50" fill="#0a0008"/>
    <g filter="url(#glowOlho)">
      <ellipse cx="-48" cy="-4" rx="28" ry="34" fill="url(#olho)"/>
      <ellipse cx="48" cy="-4" rx="28" ry="34" fill="url(#olho)"/>
      <ellipse cx="-48" cy="-10" rx="10" ry="12" fill="#ffaaaa" opacity="0.9"/>
      <ellipse cx="48" cy="-10" rx="10" ry="12" fill="#ffaaaa" opacity="0.9"/>
    </g>

    <path fill="#0a0008" d="M0 28 L-18 66 L18 66 Z"/>

    <!-- Maxilar -->
    <path fill="#d4d4dc" stroke="#1a1a22" stroke-width="6" stroke-linejoin="round"
      d="M-78 128 L-78 168 C-78 190 -60 204 -38 204 L38 204 C60 204 78 190 78 168 L78 128 Z"/>
    <g fill="#1a1a22">
      <rect x="-60" y="138" width="22" height="30" rx="3"/>
      <rect x="-30" y="138" width="22" height="30" rx="3"/>
      <rect x="8" y="138" width="22" height="30" rx="3"/>
      <rect x="38" y="138" width="22" height="30" rx="3"/>
    </g>

    <!-- Rachadura -->
    <path fill="none" stroke="#b91c1c" stroke-width="6" stroke-linecap="round"
      d="M-22 -68 L6 -36 L-6 -4 L26 28"/>
  </g>

  <text x="256" y="456" text-anchor="middle" font-family="sans-serif" font-weight="800"
    font-size="42" fill="#ff3333" fill-opacity="0.95">0x</text>
